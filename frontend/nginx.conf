server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # CSP: eval wird für React/Vite-Produktionsbuild benötigt
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src blob:;" always;

    # React Router: alle Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API-Anfragen an das Backend weiterleiten
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
