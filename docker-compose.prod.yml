services:
  db:
    image: postgres:16
    restart: always
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demre"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./.env.prod
    environment:
      STB_EXPORT_DIR: /app/storage/exports/steuerberater
    volumes:
      - ./storage:/app/storage
      - ./Eingangsrechnungen:/app/incoming_invoices
      - ./Belege:/app/expense_receipts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on: [backend]
    ports:
      - "8081:80"

volumes:
  pgdata:
